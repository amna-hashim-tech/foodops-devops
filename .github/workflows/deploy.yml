name: FoodOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: foodopsacr.azurecr.io
  AKS_CLUSTER: foodops-aks
  RESOURCE_GROUP: foodops-rg

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Test both services
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test Menu Service
        run: |
          cd menu-service
          pip install -r requirements.txt
          pytest tests/ -v

      - name: Test Order Service
        run: |
          cd order-service
          pip install -r requirements.txt
          pytest tests/ -v

  # ─────────────────────────────────────────
  # JOB 2: Build & push Docker images to ACR
  # ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag from commit SHA
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push Menu Service
        run: |
          docker build -t ${{ env.ACR_NAME }}/menu-service:${{ steps.tag.outputs.tag }} ./menu-service
          docker push ${{ env.ACR_NAME }}/menu-service:${{ steps.tag.outputs.tag }}

      - name: Build & Push Order Service
        run: |
          docker build -t ${{ env.ACR_NAME }}/order-service:${{ steps.tag.outputs.tag }} ./order-service
          docker push ${{ env.ACR_NAME }}/order-service:${{ steps.tag.outputs.tag }}

  # ─────────────────────────────────────────
  # JOB 3: Deploy to AKS via Helm
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build  # only runs if build succeeds
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }}

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        run: |
          helm upgrade --install foodops ./helm/foodops \
            --set registry=${{ env.ACR_NAME }} \
            --set imageTag=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl get pods
          kubectl get services
